services:
  postgres:
    image: postgres:16-alpine
    container_name: xeno-genie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno
      POSTGRES_DB: xeno_genie
    ports:
      - "5432:5432"
    volumes:
      - xeno_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xeno -d xeno_genie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xeno_postgres_data:

